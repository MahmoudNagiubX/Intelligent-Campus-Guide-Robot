name: Apply README Emoji Styling

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/emoji-readme.yml
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add restrained emoji hierarchy
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "# INNO — Intelligent Campus Guide Robot": "# 🤖 INNO — Intelligent Campus Guide Robot",
              "## Project Overview": "## 🎯 Project Overview",
              "## Real-World Prototype": "## 📸 Real-World Prototype",
              "## What INNO Can Do": "## ✨ What INNO Can Do",
              "## System Architecture": "## 🏗️ System Architecture",
              "### End-to-End Flow": "### 🔄 End-to-End Flow",
              "## Engineering Highlights": "## ⚙️ Engineering Highlights",
              "### Voice and Conversation Pipeline": "### 🎙️ Voice and Conversation Pipeline",
              "### Grounded Campus Intelligence": "### 📚 Grounded Campus Intelligence",
              "### Bilingual Experience": "### 🌐 Bilingual Experience",
              "### Navigation Safety Boundary": "### 🧭 Navigation Safety Boundary",
              "### Operational Reliability": "### 🛡️ Operational Reliability",
              "## Technology Stack": "## 🧰 Technology Stack",
              "## Repository Structure": "## 📁 Repository Structure",
              "## Quick Start": "## 🚀 Quick Start",
              "### Requirements": "### ✅ Requirements",
              "### Installation": "### 📦 Installation",
              "## Configuration Modes": "## 🔧 Configuration Modes",
              "### Enable Arabic": "### 🗣️ Enable Arabic",
              "### Enable MQTT Robot-State Publishing": "### 📡 Enable MQTT Robot-State Publishing",
              "## Testing": "## 🧪 Testing",
              "## Deployment": "## 🖥️ Deployment",
              "## Design Boundaries": "## ⚠️ Design Boundaries",
              "## Recognition": "## 🏆 Recognition",
              "## Developer and Project Context": "## 👨‍💻 Developer and Project Context",
              "### My Focus — Mahmoud Nagiub": "### 🎯 My Focus — Mahmoud Nagiub",
              "## Future Improvements": "## 🔮 Future Improvements",
          }

          for old, new in replacements.items():
              if new not in text:
                  text = text.replace(old, new)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/emoji-readme.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/workflows/emoji-readme.yml
          git commit -m "docs: add elegant emoji section hierarchy"
          git push origin main
