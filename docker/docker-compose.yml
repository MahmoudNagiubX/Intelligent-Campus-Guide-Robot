# Navigator - Docker Compose
# Phase 10, Step 10.1
#
# Usage:
#   docker-compose up --build
#
# Prerequisites:
#   - Copy .env.example to .env and fill in API keys
#   - Ensure your microphone and speaker are available on the host
#   - On Raspberry Pi, adjust device paths if needed

services:
  navigator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: navigator-robot
    restart: unless-stopped

    # ── Environment ──────────────────────────────────────────────────────────
    env_file:
      - ../.env

    # ── Volumes ───────────────────────────────────────────────────────────────
    # Persist database, logs, and CSV data outside the container
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../prompts:/app/prompts:ro  # prompts are read-only at runtime

    # ── Audio device passthrough ──────────────────────────────────────────────
    # This gives the container access to the host audio hardware.
    # On Raspberry Pi OS with ALSA:
    #   devices are typically /dev/snd/*
    devices:
      - /dev/snd
    group_add:
      - audio

    # Alternatively, for PulseAudio on desktop Linux:
    # environment:
    #   - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
    # volumes:
    #   - ${XDG_RUNTIME_DIR}/pulse/native:/run/user/1000/pulse/native

    # ── Networking ────────────────────────────────────────────────────────────
    # Navigator calls out to Deepgram, Groq, and optionally the local hardware bridge.
    network_mode: host
    # Or use a dedicated network:
    # networks:
    #   - navigator-net
    #
    # ports:
    #   - "8080:8080"   # Optional: expose an API or health endpoint

    # ── Resource limits (Pi 5 has 8 GB — leave room for the OS) ──────────────
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "3.5"

    # ── Logging ───────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# networks:
#   navigator-net:
#     driver: bridge
